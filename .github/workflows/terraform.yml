name: Terraform CI/CD

on:
  # -------------------------------------------------------------------------
  # PR → validate only. No GCP credentials needed. Fast feedback on every PR.
  # -------------------------------------------------------------------------
  pull_request:
    branches: [master]
    paths:
      - 'foundation/**'
      - 'resources/**'
      - 'modules/**'
      - 'bootstrap/**'

  # -------------------------------------------------------------------------
  # Manual trigger → plan or apply a specific layer.
  # Prerequisites: configure WIF_PROVIDER, TF_SERVICE_ACCOUNT, TF_STATE_BUCKET
  # in GitHub Settings → Variables before running.
  # -------------------------------------------------------------------------
  workflow_dispatch:
    inputs:
      layer:
        description: 'Which layer to plan/apply'
        required: true
        type: choice
        options:
          - foundation/standard
          - foundation/hipaa
          - resources
      action:
        description: 'Plan (dry-run) or Apply (live changes)'
        required: true
        type: choice
        options:
          - plan
          - apply
      var_file:
        description: 'tfvars file relative to the layer directory (e.g. environments/shared-vpc.tfvars)'
        required: true
        default: 'environments/shared-vpc.tfvars'
      confirm_apply:
        description: 'Type APPLY to confirm (required when action=apply)'
        required: false
        default: ''

permissions:
  contents: read
  id-token: write       # Required for Workload Identity Federation
  pull-requests: write  # Required to post plan output as PR comment

env:
  TF_VERSION: "1.9.7"
  # Configure these in GitHub Settings → Variables before running plan/apply:
  #   TF_STATE_BUCKET    — GCS bucket for Terraform state
  #   WIF_PROVIDER       — Workload Identity Provider full resource name
  #   TF_SERVICE_ACCOUNT — Terraform SA email

jobs:
  # ===========================================================================
  # PR: validate all modules — no GCP credentials required
  # ===========================================================================
  validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Validate all modules
        run: |
          for dir in \
            bootstrap \
            foundation/standard \
            foundation/hipaa \
            resources \
            modules/vpc modules/subnets modules/shared-vpc modules/cloud-nat \
            modules/firewall modules/folder-factory modules/project-factory \
            modules/org-policies modules/gke-autopilot modules/gke-self-managed \
            modules/cloud-sql-postgres modules/cloud-sql-mysql modules/sql-private-connection \
            modules/vm-instance modules/gcs-bucket modules/artifact-registry \
            modules/cloud-dns modules/bigquery modules/monitoring modules/logging \
            modules/assured-workloads modules/vpc-service-controls \
            modules/foundation-core; do
            echo "Validating $dir..."
            cd $dir
            terraform init -backend=false -upgrade -no-color
            terraform validate -no-color
            cd $GITHUB_WORKSPACE
          done

  # ===========================================================================
  # Manual: plan or apply a layer
  # Run via Actions → "Run workflow". Requires GCP vars in Settings → Variables.
  # For apply: set confirm_apply to exactly "APPLY".
  # ===========================================================================
  deploy:
    name: "${{ inputs.action == 'apply' && 'Apply' || 'Plan' }} — ${{ inputs.layer }}"
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment: ${{ inputs.action == 'apply' && 'production' || 'non-prod' }}

    steps:
      - name: Verify prerequisites
        run: |
          if [ -z "${{ vars.WIF_PROVIDER }}" ]; then
            echo "::error::WIF_PROVIDER is not set. Go to Settings → Variables and add it."
            exit 1
          fi
          if [ -z "${{ vars.TF_STATE_BUCKET }}" ]; then
            echo "::error::TF_STATE_BUCKET is not set. Go to Settings → Variables and add it."
            exit 1
          fi
          if [ "${{ inputs.action }}" = "apply" ] && [ "${{ inputs.confirm_apply }}" != "APPLY" ]; then
            echo "::error::To apply, set confirm_apply to exactly APPLY. Got: '${{ inputs.confirm_apply }}'"
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Authenticate to GCP via Workload Identity
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.TF_SERVICE_ACCOUNT }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ inputs.layer }}
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="prefix=${{ inputs.layer }}" \
            -no-color

      - name: Terraform Plan
        if: inputs.action == 'plan'
        working-directory: ${{ inputs.layer }}
        run: |
          terraform plan \
            -var-file=${{ inputs.var_file }} \
            -no-color \
            -out=tfplan 2>&1 | tee plan_output.txt

      - name: Upload plan artifact
        if: inputs.action == 'plan'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ inputs.layer == 'foundation/standard' && 'foundation-standard' || inputs.layer == 'foundation/hipaa' && 'foundation-hipaa' || 'resources' }}
          path: |
            ${{ inputs.layer }}/tfplan
            ${{ inputs.layer }}/plan_output.txt
          retention-days: 7

      - name: Terraform Apply
        if: inputs.action == 'apply'
        working-directory: ${{ inputs.layer }}
        run: |
          terraform apply \
            -var-file=${{ inputs.var_file }} \
            -auto-approve \
            -no-color
