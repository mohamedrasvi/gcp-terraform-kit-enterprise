name: Terraform CI/CD

on:
  pull_request:
    branches: [master]
    paths:
      - 'foundation/**'
      - 'resources/**'
      - 'modules/**'
      - 'bootstrap/**'
  push:
    branches: [master]
    paths:
      - 'foundation/**'
      - 'resources/**'
      - 'modules/**'

permissions:
  contents: read
  id-token: write       # Required for Workload Identity Federation
  pull-requests: write  # Required to post plan output as PR comment

env:
  TF_VERSION: "1.9.7"
  # Set these as GitHub Actions repository variables (Settings → Variables)
  # TF_STATE_BUCKET   — GCS bucket name for Terraform state
  # WIF_PROVIDER      — Workload Identity Provider full resource name
  # TF_SERVICE_ACCOUNT — Terraform SA email

jobs:
  # ---------------------------------------------------------------------------
  # Validate all modules and layers on every PR
  # ---------------------------------------------------------------------------
  validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Validate all modules
        run: |
          for dir in \
            bootstrap \
            foundation/standard \
            foundation/hipaa \
            resources \
            modules/vpc modules/subnets modules/shared-vpc modules/cloud-nat \
            modules/firewall modules/folder-factory modules/project-factory \
            modules/org-policies modules/gke-autopilot modules/gke-self-managed \
            modules/cloud-sql-postgres modules/cloud-sql-mysql modules/sql-private-connection \
            modules/vm-instance modules/gcs-bucket modules/artifact-registry \
            modules/cloud-dns modules/bigquery modules/monitoring modules/logging \
            modules/assured-workloads modules/vpc-service-controls \
            modules/foundation-core; do
            echo "Validating $dir..."
            cd $dir
            terraform init -backend=false -upgrade -no-color
            terraform validate -no-color
            cd $GITHUB_WORKSPACE
          done

  # ---------------------------------------------------------------------------
  # Plan foundation/standard on PR — posts output as a comment
  # ---------------------------------------------------------------------------
  plan-foundation:
    name: Plan Foundation (Standard)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && vars.WIF_PROVIDER != ''
    environment: non-prod

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP via Workload Identity
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.TF_SERVICE_ACCOUNT }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: foundation/standard
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="prefix=foundation/standard" \
            -no-color

      - name: Terraform Plan
        id: plan
        working-directory: foundation/standard
        run: |
          terraform plan \
            -var-file=environments/shared-vpc.tfvars \
            -no-color \
            -out=tfplan 2>&1 | tee plan_output.txt
          echo "exitcode=$?" >> $GITHUB_OUTPUT

      - name: Post Plan to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('foundation/standard/plan_output.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.substring(0, 60000) + '\n...[truncated]' : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan — foundation/standard\n\`\`\`\n${truncated}\n\`\`\``
            });

  # ---------------------------------------------------------------------------
  # Plan foundation/hipaa on PR — posts output as a comment
  # ---------------------------------------------------------------------------
  plan-foundation-hipaa:
    name: Plan Foundation (HIPAA)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && vars.WIF_PROVIDER != ''
    environment: non-prod

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP via Workload Identity
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.TF_SERVICE_ACCOUNT }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: foundation/hipaa
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="prefix=foundation/hipaa" \
            -no-color

      - name: Terraform Plan
        id: plan
        working-directory: foundation/hipaa
        run: |
          terraform plan \
            -var-file=environments/shared-vpc.tfvars \
            -no-color \
            -out=tfplan 2>&1 | tee plan_output.txt
          echo "exitcode=$?" >> $GITHUB_OUTPUT

      - name: Post Plan to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('foundation/hipaa/plan_output.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.substring(0, 60000) + '\n...[truncated]' : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan — foundation/hipaa\n\`\`\`\n${truncated}\n\`\`\``
            });

  # ---------------------------------------------------------------------------
  # Plan resources/dev on PR
  # ---------------------------------------------------------------------------
  plan-resources-dev:
    name: Plan Resources (dev)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && vars.WIF_PROVIDER != ''
    environment: non-prod

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP via Workload Identity
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.TF_SERVICE_ACCOUNT }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: resources
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="prefix=resources" \
            -no-color

      - name: Select dev workspace
        working-directory: resources
        run: terraform workspace select dev || terraform workspace new dev

      - name: Terraform Plan (dev)
        working-directory: resources
        run: |
          terraform plan \
            -var-file=env/dev.tfvars \
            -no-color \
            -out=tfplan 2>&1 | tee plan_output.txt

      - name: Post Plan to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('resources/plan_output.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.substring(0, 60000) + '\n...[truncated]' : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan — resources/dev\n\`\`\`\n${truncated}\n\`\`\``
            });

  # ---------------------------------------------------------------------------
  # Apply foundation/standard on merge to master
  # ---------------------------------------------------------------------------
  apply-foundation:
    name: Apply Foundation (Standard)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master' && vars.WIF_PROVIDER != ''
    environment: production
    needs: []

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP via Workload Identity
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.TF_SERVICE_ACCOUNT }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: foundation/standard
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="prefix=foundation/standard" \
            -no-color

      - name: Terraform Apply
        working-directory: foundation/standard
        run: |
          terraform apply \
            -var-file=environments/shared-vpc.tfvars \
            -auto-approve \
            -no-color

  # ---------------------------------------------------------------------------
  # Apply foundation/hipaa on merge to master
  # ---------------------------------------------------------------------------
  apply-foundation-hipaa:
    name: Apply Foundation (HIPAA)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master' && vars.WIF_PROVIDER != ''
    environment: production
    needs: []

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP via Workload Identity
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.TF_SERVICE_ACCOUNT }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: foundation/hipaa
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="prefix=foundation/hipaa" \
            -no-color

      - name: Terraform Apply
        working-directory: foundation/hipaa
        run: |
          terraform apply \
            -var-file=environments/shared-vpc.tfvars \
            -auto-approve \
            -no-color

  # ---------------------------------------------------------------------------
  # Apply resources/dev on merge to master
  # ---------------------------------------------------------------------------
  apply-resources-dev:
    name: Apply Resources (dev)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master' && vars.WIF_PROVIDER != ''
    environment: production
    needs: [apply-foundation]

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP via Workload Identity
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.TF_SERVICE_ACCOUNT }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: resources
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="prefix=resources" \
            -no-color

      - name: Select dev workspace
        working-directory: resources
        run: terraform workspace select dev || terraform workspace new dev

      - name: Terraform Apply (dev)
        working-directory: resources
        run: |
          terraform apply \
            -var-file=env/dev.tfvars \
            -auto-approve \
            -no-color
